name: Azure Static Web Apps CI/CD

on:
  workflow_dispatch: 

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    environment: AZPROD
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Install dependencies and build
        run: |
          cd frontend
          npm install
          npm run build

      - name: Substitute JSON
        uses: restackio/update-json-file-action@2.1
        with:
          file: frontend/dist/appconfig.json
          fields: |
            {
              "VITE_API_BASE": "${{ vars.VITE_API_BASE }}",
              "VITE_OIDC_AUTHORITY": "${{ vars.VITE_OIDC_AUTHORITY }}",
              "VITE_OIDC_CLIENT_ID": "${{ vars.VITE_OIDC_CLIENT_ID }}",
              "VITE_OIDC_REDIRECT_URI": "${{ vars.VITE_OIDC_REDIRECT_URI }}"
            }

      - name: Move/Rename config.json to js
        run: |
          echo window.APP_CONFIG= > appconfig.js
          cat appconfig.json >> appconfig.js
        working-directory: frontend/dist

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_FOREST_0A1DECE00 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          app_location: "/frontend/dist" # Point directly to build directory
          api_location: "" # Api source code path - optional
          output_location: "" # Empty when skipping build
          skip_app_build: true
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ICY_FOREST_0A1DECE00 }}
          action: "close"
